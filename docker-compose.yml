version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: personarag-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MODELS=/ollama/models
    volumes:
      - ollama_models:/ollama/models
    networks:
      - personarag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: personarag-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - APP_NAME=ai-portfolio-agent API
      - CORS_ORIGINS=http://localhost:3000,http://frontend:3000
      - LOG_LEVEL=INFO
      - RETRIEVAL_BACKEND=auto
      - RETRIEVAL_TOP_K=5
      - TTS_PROVIDER=mock
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_CHAT_MODEL=qwen2.5:3b
      - OLLAMA_EMBED_MODEL=nomic-embed-text
    env_file:
      - backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - personarag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personarag-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    env_file:
      - frontend/.env.local
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - personarag-network

volumes:
  ollama_models:
    driver: bridge
