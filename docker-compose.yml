version: "3.8"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: personarag-ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_MODELS=/ollama/models
    volumes:
      - ollama_models:/ollama/models
    networks:
      - personarag-network
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 40s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: personarag-backend
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - "APP_NAME=ai-portfolio-agent API"
      # Vercel: set in repo-root .env or shell, e.g. CORS_ORIGINS=https://your-app.vercel.app
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://frontend:3000}
      - LOG_LEVEL=INFO
      # tfidf: fast boot, no Ollama embed pass. Use auto + nomic-embed-text for semantic RAG.
      - RETRIEVAL_BACKEND=tfidf
      # Lower K = less context in the prompt = faster LLM (slightly less recall).
      - RETRIEVAL_TOP_K=3
      # Real speech in container (see backend/Dockerfile). Use mock only for silent tests.
      - TTS_PROVIDER=piper
      - PIPER_BINARY=/usr/local/bin/piper
      - PIPER_MODEL_PATH=/app/piper-voice/en_US-ryan-low.onnx
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_CHAT_MODEL=qwen2.5:3b
      # Shorter spoken summary in voice mode = faster Piper (full text answer unchanged).
      - VOICE_TTS_MAX_CHARS=280
      - OLLAMA_EMBED_MODEL=nomic-embed-text
      # CPU-friendly STT; override in backend/.env if you need higher accuracy (small/base).
      - STT_MODEL_SIZE=tiny
      # Skip language detection = faster STT on CPU when you know the language.
      - STT_LANGUAGE=en
      # Docker: chunks live under /app/data (see volume below)
      - INGEST_REPO_ROOT=/app
    env_file:
      - backend/.env
    volumes:
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - personarag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Omit when the UI is on Vercel: docker compose up -d ollama backend
  frontend:
    profiles:
      - local-ui
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: personarag-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
    env_file:
      - frontend/.env.local
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - personarag-network

networks:
  personarag-network:
    driver: bridge

volumes:
  ollama_models:
