name: Backend Docker

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/docker-backend.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/docker-backend.yml"

jobs:
  build-and-import-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: personarag-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Import smoke (faster-whisper + ffmpeg in image)
        run: |
          docker run --rm personarag-backend:test python -c "import fastapi, httpx, numpy, sklearn, multipart; import faster_whisper, ctranslate2; import subprocess; subprocess.run(['ffmpeg','-version'], check=True, capture_output=True); print('OK: imports + ffmpeg')"
